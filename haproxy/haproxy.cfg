# HAProxy egress proxy for Dom sandbox containers.
#
# Listens on :8443 for HTTPS CONNECT requests. Inspects the SNI hostname
# and only forwards to hosts in the allowlist below. All other hosts are
# rejected with TCP-RST.
#
# Allowlist mirrors src/guardrails.ts ALLOWED_HOSTS plus api.anthropic.com.

global
    maxconn 1024
    log stdout format raw daemon

defaults
    mode tcp
    timeout connect 10s
    timeout client 60s
    timeout server 60s
    log global
    option tcplog

frontend egress
    bind *:8443
    mode tcp
    tcp-request inspect-delay 5s
    tcp-request content accept if { req.ssl_hello_type 1 }

    # Allowlist — TLS SNI must match one of these
    acl host_allowed req.ssl_sni -m end .anthropic.com
    acl host_allowed req.ssl_sni -m end .npmjs.org
    acl host_allowed req.ssl_sni -m end .yarnpkg.com
    acl host_allowed req.ssl_sni -m end .pypi.org
    acl host_allowed req.ssl_sni -m end .pythonhosted.org
    acl host_allowed req.ssl_sni -m end .rubygems.org
    acl host_allowed req.ssl_sni -m end .crates.io
    acl host_allowed req.ssl_sni -m end .pkg.go.dev
    acl host_allowed req.ssl_sni -m end .golang.org
    acl host_allowed req.ssl_sni -m end .alpinelinux.org
    acl host_allowed req.ssl_sni -m end .debian.org
    acl host_allowed req.ssl_sni -m end .ubuntu.com
    acl host_allowed req.ssl_sni -m end github.com
    acl host_allowed req.ssl_sni -m end .githubusercontent.com
    acl host_allowed req.ssl_sni -m end .jsdelivr.net
    acl host_allowed req.ssl_sni -m end .unpkg.com

    # Reject everything else
    tcp-request content reject unless host_allowed

    use_backend dynamic if host_allowed

backend dynamic
    mode tcp
    server target 0.0.0.0:443 check-sni req.ssl_sni sni req.ssl_sni
