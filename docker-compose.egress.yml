# Production egress-filtering stack.
#
# Brings up an HAProxy container on dom-sandbox-net that performs SNI-based
# hostname allowlisting. To enforce egress filtering, agent containers must
# be configured to use this proxy:
#
#   - HTTPS_PROXY=http://egress-proxy:8443
#   - HTTP_PROXY=http://egress-proxy:8443
#
# (Set these in src/run.ts or via -e on docker run when running in production.)
#
# Allowlist is the same set as src/guardrails.ts ALLOWED_HOSTS plus the
# Anthropic API. Edit haproxy/haproxy.cfg to change the list.
#
# Usage:
#   docker-compose -f docker-compose.egress.yml up -d
#   docker-compose -f docker-compose.egress.yml down

services:
  egress-proxy:
    image: haproxy:2.9-alpine
    container_name: dom-egress-proxy
    networks:
      - dom-sandbox-net
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    restart: unless-stopped
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    security_opt:
      - no-new-privileges:true

networks:
  dom-sandbox-net:
    external: true
    name: dom-sandbox-net
